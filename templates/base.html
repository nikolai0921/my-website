<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的作品集</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- 導覽列 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">4GG 的網站</a>
        <div class="navbar-nav ms-auto align-items-center">
            <a class="nav-link" href="/">首頁</a>
            <a class="nav-link" href="/portfolio">作品集</a>
            <a class="nav-link" href="/blog">部落格</a>
            {% if current_user.is_authenticated %}
                <a class="nav-link" href="/logout">登出</a>
            {% else %}
                <a class="nav-link" href="/login">登入</a>
            {% endif %}
            <button class="btn btn-outline-light btn-sm ms-3" onclick="toggleDark()">🌙 深色</button>
            <form class="d-flex ms-3" action="/search" method="GET">
                <input class="form-control form-control-sm me-2" type="search"
                       name="q" placeholder="搜尋文章..." style="width: 180px;">
                <button class="btn btn-outline-light btn-sm" type="submit">🔍</button>
            </form>
        </div>
    </div>
</nav>

    <!-- 主內容 -->
    <main class="container mt-5">
        {% block content %}{% endblock %}
    </main>

    <!-- 頁尾 -->
    <footer class="text-center py-4 mt-5 bg-light">
        <p class="mb-0">© 2025 4GG 的網站</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
