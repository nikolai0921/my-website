{% extends "base.html" %}
{% block content %}

<h1 class="mb-4">編輯文章</h1>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<form method="POST" id="editForm">
    <div class="mb-3">
        <label class="form-label">標題</label>
        <input type="text" name="title" class="form-control"
               value="{{ post.title }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">內容</label>
        <div id="editor" style="height: 400px;"></div>
        <input type="hidden" name="content" id="content">
    </div>
    <div class="mb-3">
    <label class="form-label">標籤 <span class="text-muted small">（用逗號分隔）</span></label>
    <input type="text" name="tags" class="form-control"
           value="{{ post.tags | map(attribute='name') | join(', ') }}">
</div>
    <button type="submit" class="btn btn-dark">儲存</button>
    <a href="/blog/{{ post.id }}" class="btn btn-outline-secondary ms-2">取消</a>
</form>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
    var quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: {
                container: [
                    [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'align': [] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['blockquote', 'code-block'],
                    ['link', 'image'],
                    ['clean']
                ],
                handlers: {
                    image: function() {
                        var input = document.createElement('input');
                        input.setAttribute('type', 'file');
                        input.setAttribute('accept', 'image/*');
                        input.click();
                        input.onchange = function() {
                            var file = input.files[0];
                            var formData = new FormData();
                            formData.append('image', file);
                            fetch('/upload_image', {
                                method: 'POST',
                                body: formData
                            })
                            .then(res => res.json())
                            .then(data => {
                                if (data.url) {
                                    var range = quill.getSelection();
                                    quill.insertEmbed(range.index, 'image', data.url);
                                } else {
                                    alert('圖片上傳失敗，請再試一次');
                                }
                            });
                        };
                    }
                }
            }
        }
    });

    quill.root.innerHTML = {{ post.content | tojson }};

    document.getElementById('editForm').onsubmit = function() {
        document.getElementById('content').value = quill.root.innerHTML;
    };
</script>

{% endblock %}
