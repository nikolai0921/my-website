{% extends "base.html" %}
{% block content %}

<h1 class="mb-4">新增文章</h1>

<!-- 引入 Quill -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<form method="POST" id="postForm">
    <div class="mb-3">
        <label class="form-label">標題</label>
        <input type="text" name="title" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">內容</label>
        <!-- Quill 編輯器容器 -->
        <div id="editor" style="height: 400px;"></div>
        <!-- 隱藏欄位儲存 HTML 內容 -->
        <input type="hidden" name="content" id="content">
    </div>
    <div class="mb-3">
    <label class="form-label">標籤 <span class="text-muted small">（用逗號分隔，例如：Python, Flask, 教學）</span></label>
    <input type="text" name="tags" class="form-control" placeholder="Python, Flask, 教學">
</div>
    <button type="submit" class="btn btn-dark" id="submitBtn">發布文章</button>
    <a href="/blog" class="btn btn-outline-secondary ms-2">取消</a>
</form>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
    // 初始化 Quill 編輯器
    var quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'align': [] }],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['blockquote', 'code-block'],
                ['link', 'image'],
                ['clean']
            ]
        }
    });

    // 送出前把編輯器內容塞進隱藏欄位
    document.getElementById('postForm').onsubmit = function() {
        document.getElementById('content').value = quill.root.innerHTML;
    };
</script>

{% endblock %}
