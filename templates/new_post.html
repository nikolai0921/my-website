{% extends "base.html" %}
{% block content %}

<h1 class="mb-4">新增文章</h1>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">標題</label>
        <input type="text" name="title" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">內容</label>
        <textarea name="content" class="form-control" rows="10" required></textarea>
    </div>
    <button type="submit" class="btn btn-dark">發布文章</button>
    <a href="/blog" class="btn btn-outline-secondary ms-2">取消</a>
</form>

{% endblock %}
