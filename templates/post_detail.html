{% extends "base.html" %}
{% block content %}

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<h1>{{ post.title }}</h1>
<p class="text-muted">{{ post.created_at.strftime("%Y-%m-%d") }}</p>
<div class="mb-3">
    {% for tag in post.tags %}
        <a href="/tag/{{ tag.name }}" class="badge bg-secondary text-decoration-none me-1">{{ tag.name }}</a>
    {% endfor %}
</div>
<hr>
<div class="post-content ql-editor">{{ post.content | safe }}</div>

<div class="mt-4">
    <a href="/blog" class="btn btn-outline-dark">← 回部落格</a>
    {% if current_user.is_authenticated %}
        <a href="/blog/{{ post.id }}/edit" class="btn btn-secondary ms-2">✏️ 編輯</a>
        <form method="POST" action="/blog/{{ post.id }}/delete"
              style="display:inline;"
              onsubmit="return confirm('確定要刪除這篇文章嗎？')">
            <button type="submit" class="btn btn-danger ms-2">🗑️ 刪除</button>
        </form>
    {% endif %}
</div>

{% endblock %}
