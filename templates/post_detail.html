{% extends "base.html" %}
{% block content %}

<h1>{{ post.title }}</h1>
<p class="text-muted">{{ post.created_at.strftime("%Y-%m-%d") }}</p>
<hr>
<p class="post-content">{{ post.content }}</p>

<div class="mt-4">
    <a href="/blog" class="btn btn-outline-dark">← 回部落格</a>

    {% if current_user.is_authenticated %}
        <a href="/blog/{{ post.id }}/edit" class="btn btn-secondary ms-2">✏️ 編輯</a>
        <form method="POST" action="/blog/{{ post.id }}/delete"
              style="display:inline;"
              onsubmit="return confirm('確定要刪除這篇文章嗎？')">
            <button type="submit" class="btn btn-danger ms-2">🗑️ 刪除</button>
        </form>
    {% endif %}
</div>

{% endblock %}
